<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cam-clip">
      <rect x="100" y="180" width="380" height="320" rx="32"></rect>
    </clipPath>
  </defs>

  <!-- Camera body -->
  <rect x="100" y="180" width="380" height="320" rx="32" fill="#1a7a3c"></rect>

  <!-- Lens outer ring -->
  <circle cx="295" cy="340" r="110" fill="#155f2f"></circle>
  <!-- Lens mid ring -->
  <circle cx="295" cy="340" r="85" fill="#0f4522"></circle>
  <!-- Lens inner -->
  <circle cx="295" cy="340" r="60" fill="#1a7a3c"></circle>
  <!-- Lens highlight -->
  <circle cx="275" cy="320" r="14" fill="#4dc97a" opacity="0.4"></circle>
  <circle cx="268" cy="313" r="6" fill="#a8f0c0" opacity="0.5"></circle>

  <!-- Film strip holes top -->
  <rect x="120" y="192" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="164" y="192" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="208" y="192" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="252" y="192" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="296" y="192" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="340" y="192" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="384" y="192" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="428" y="192" width="28" height="22" rx="5" fill="#0f4522"></rect>

  <!-- Film strip holes bottom -->
  <rect x="120" y="466" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="164" y="466" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="208" y="466" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="252" y="466" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="296" y="466" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="340" y="466" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="384" y="466" width="28" height="22" rx="5" fill="#0f4522"></rect>
  <rect x="428" y="466" width="28" height="22" rx="5" fill="#0f4522"></rect>

  <!-- Play triangle -->
  <polygon points="275,305 275,375 335,340" fill="#4dc97a"></polygon>
